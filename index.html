<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Ferragens - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body class="login-page">
    <main class="login-container">
        <section class="login-box">
            <div class="brand-mark mb-3">
                <img src="img/logo.png" alt="JD Ferragens">
            </div>
            <h1 class="h3 mb-1">JD Ferragens</h1>
            <p class="text-muted mb-4">Acesso ao sistema</p>

            <div class="d-grid gap-2">
                <button id="googleLoginBtn" class="btn btn-primary w-100" type="button">
                    <i class="fab fa-google me-2"></i>Entrar com Google
                </button>
            </div>

            <div class="login-divider">
                <span>ou</span>
            </div>

            <a href="cadastro-usuario.html" class="btn btn-outline-primary w-100" data-ignore-spa="true">
                <i class="fab fa-google me-2"></i>Cadastrar com Google
            </a>

            <div class="alert alert-danger mt-3 d-none" id="errorAlert"></div>
            <div class="alert alert-info mt-3 d-none" id="infoAlert"></div>
        </section>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
