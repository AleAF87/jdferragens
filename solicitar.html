<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Itens - JD Ferragens</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
    <div id="navbar"></div>
    <main class="container-fluid mt-4">
        <div class="page-header">
            <div>
                <span class="section-label">Solicitar</span>
                <h1>Itens do estoque</h1>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-xl-8">
                <div class="card">
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input id="solicitarBusca" type="search" class="form-control" placeholder="Buscar por codigo ou produto">
                        </div>
                        <div id="solicitarProdutos"></div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-4">
                <div class="card order-sticky-card">
                    <div class="card-header">
                        <h5 class="mb-0">Pedido</h5>
                    </div>
                    <div class="card-body">
                        <div id="solicitarCarrinho"></div>
                        <button id="enviarSolicitacaoBtn" type="button" class="btn btn-primary w-100 mt-3" disabled>
                            <i class="fas fa-paper-plane me-2"></i>Enviar solicitacao
                        </button>
                        <div id="solicitarAlert" class="alert mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth-check.js"></script>
    <script type="module" src="js/protected-page.js"></script>
    <script type="module" src="js/solicitar.js"></script>
</body>
</html>
