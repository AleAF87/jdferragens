<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - JD Ferragens</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
    <div id="navbar"></div>
    <main class="container-fluid mt-4">
        <div class="page-header">
            <div>
                <span class="section-label">Cadastro</span>
                <h1>Cadastrar produto</h1>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <form id="cadastroProdutoForm" class="row g-3">
                    <div class="col-12 col-lg-3">
                        <label for="codigoProduto" class="form-label">Código</label>
                        <input id="codigoProduto" name="codigo" type="text" class="form-control" required>
                    </div>
                    <div class="col-12 col-lg-5">
                        <label for="nomeProduto" class="form-label">Produto</label>
                        <input id="nomeProduto" name="nome" type="text" class="form-control" required>
                    </div>
                    <div class="col-12 col-lg-2">
                        <label for="quantidadeProduto" class="form-label">Quantidade</label>
                        <input id="quantidadeProduto" name="quantidade" type="number" min="0" step="1" class="form-control" required>
                    </div>
                    <div class="col-12 col-lg-2">
                        <label for="precoProduto" class="form-label">Preço</label>
                        <input id="precoProduto" name="preco" type="number" min="0" step="0.01" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="descricaoProduto" class="form-label">Descrição</label>
                        <textarea id="descricaoProduto" name="descricao" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Salvar produto
                        </button>
                    </div>
                </form>
                <div id="cadastroAlert" class="alert mt-3 d-none"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth-check.js"></script>
    <script type="module" src="js/protected-page.js"></script>
    <script type="module" src="js/cadastro.js"></script>
</body>
</html>
