<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuario - JD Ferragens</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body class="login-page">
    <main class="login-container public-register-page">
        <section class="public-register-shell">
            <div class="text-center mb-4">
                <div class="brand-mark mb-3">
                    <img src="img/logo.png" alt="JD Ferragens">
                </div>
                <h1 class="h3 mb-2">Cadastro de Usuario</h1>
                <p class="text-muted mb-0">Entre com sua conta Google e envie seus dados para aprovacao do administrador.</p>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Conta Google</h5>
                </div>
                <div class="card-body">
                    <div id="googleAccountBox" class="google-account-box">
                        <div>
                            <span class="section-label">Aguardando identificacao</span>
                            <p class="mb-0 text-muted">Use o Google para vincular o cadastro a uma conta segura.</p>
                        </div>
                        <button id="googleSignupBtn" type="button" class="btn btn-primary">
                            <i class="fab fa-google me-2"></i>Entrar com Google
                        </button>
                    </div>
                </div>
            </div>

            <form id="userSignupForm" novalidate>
                <fieldset id="userSignupFieldset" disabled>
                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="mb-0">Dados pessoais</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroCpf" class="form-label">CPF</label>
                                    <input id="cadastroCpf" name="cpf" type="text" class="form-control" maxlength="11" inputmode="numeric" placeholder="Digite apenas numeros" required>
                                </div>
                                <div class="col-12 col-lg-8">
                                    <label for="cadastroNome" class="form-label">Nome completo</label>
                                    <input id="cadastroNome" name="nome" type="text" class="form-control" autocomplete="name" required>
                                </div>
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroNascimento" class="form-label">Data de nascimento</label>
                                    <input id="cadastroNascimento" name="dataNascimento" type="date" class="form-control">
                                </div>
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroWhatsapp" class="form-label">WhatsApp</label>
                                    <input id="cadastroWhatsapp" name="whatsapp" type="text" class="form-control" inputmode="numeric" placeholder="(00) 00000-0000">
                                </div>
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroEmail" class="form-label">E-mail Google</label>
                                    <input id="cadastroEmail" name="email" type="email" class="form-control" disabled>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">
                            <h5 class="mb-0">Endereco</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-12 col-lg-3">
                                    <label for="cadastroCep" class="form-label">CEP</label>
                                    <div class="input-group">
                                        <input id="cadastroCep" name="cep" type="text" class="form-control" maxlength="9" inputmode="numeric" placeholder="00000-000">
                                        <button id="buscarCepBtn" type="button" class="btn btn-outline-secondary">Buscar</button>
                                    </div>
                                </div>
                                <div class="col-12 col-lg-7">
                                    <label for="cadastroEndereco" class="form-label">Endereco</label>
                                    <input id="cadastroEndereco" name="endereco" type="text" class="form-control">
                                </div>
                                <div class="col-12 col-lg-2">
                                    <label for="cadastroNumero" class="form-label">Numero</label>
                                    <input id="cadastroNumero" name="numero" type="text" class="form-control">
                                </div>
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroComplemento" class="form-label">Complemento</label>
                                    <input id="cadastroComplemento" name="complemento" type="text" class="form-control">
                                </div>
                                <div class="col-12 col-lg-4">
                                    <label for="cadastroBairro" class="form-label">Bairro</label>
                                    <input id="cadastroBairro" name="bairro" type="text" class="form-control">
                                </div>
                                <div class="col-12 col-lg-3">
                                    <label for="cadastroCidade" class="form-label">Cidade</label>
                                    <input id="cadastroCidade" name="cidade" type="text" class="form-control">
                                </div>
                                <div class="col-12 col-lg-1">
                                    <label for="cadastroEstado" class="form-label">UF</label>
                                    <input id="cadastroEstado" name="estado" type="text" class="form-control" maxlength="2">
                                </div>
                            </div>
                        </div>
                    </div>
                </fieldset>

                <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">
                    <a href="index.html" class="btn btn-outline-secondary" data-ignore-spa="true">
                        <i class="fas fa-arrow-left me-2"></i>Voltar ao login
                    </a>
                    <button id="submitSignupBtn" type="submit" class="btn btn-primary" disabled>
                        <i class="fas fa-paper-plane me-2"></i>Enviar para aprovacao
                    </button>
                </div>
            </form>

            <div id="signupAlert" class="alert mt-4 d-none"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/cadastro-usuario.js"></script>
</body>
</html>
